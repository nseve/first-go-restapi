version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: project_manager_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: project_manager
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: project_manager_app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: project_manager
      JWT_SECRET: supersecret

  frontend:
    build: ./frontend
    container_name: project_manager_frontend
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  pgdata: